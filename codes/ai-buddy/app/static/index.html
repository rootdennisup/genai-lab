<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI-Buddy Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      background: #f6f7f9;
      color: #1f2937;
    }

    .page {
      max-width: 860px;
      margin: 0 auto;
      padding: 32px 20px;
    }

    h1 {
      margin: 0 0 20px;
      font-size: 28px;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 20px;
    }

    .row {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      color: #4b5563;
    }

    input,
    textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 15px;
      line-height: 1.5;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 10px 16px;
      background: #2563eb;
      color: white;
      font-size: 15px;
      cursor: pointer;
    }

    button:disabled {
      background: #93c5fd;
      cursor: not-allowed;
    }

    .messages {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      border-radius: 8px;
      padding: 12px 14px;
      line-height: 1.7;
      white-space: pre-wrap;
    }

    .user {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
    }

    .assistant {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }

    .meta {
      margin-bottom: 6px;
      font-size: 13px;
      color: #6b7280;
    }

    .error {
      color: #b91c1c;
    }
  </style>
</head>
<body>
  <main class="page">
    <h1>AI-Buddy Chat</h1>

    <section class="panel">
      <div class="row">
        <label for="chatId">Chat ID</label>
        <input id="chatId" value="0710001" />
      </div>

      <div class="row">
        <label for="persona">Persona</label>
        <input id="persona" value="大模型开发指导老师" />
      </div>

      <div class="row">
        <label for="message">Message</label>
        <textarea id="message">请介绍一下你自己</textarea>
      </div>

      <button id="sendButton">发送</button>

      <div id="messages" class="messages"></div>
    </section>
  </main>

  <script>
    const sendButton = document.getElementById("sendButton");
    const messages = document.getElementById("messages");

    function appendMessage(role, content = "") {
      const wrapper = document.createElement("div");
      wrapper.className = `message ${role}`;

      const meta = document.createElement("div");
      meta.className = "meta";
      meta.textContent = role === "user" ? "You" : "AI-Buddy";

      const body = document.createElement("div");
      body.textContent = content;

      wrapper.appendChild(meta);
      wrapper.appendChild(body);
      messages.appendChild(wrapper);

      return body;
    }

    async function sendMessage() {
      const chatId = document.getElementById("chatId").value.trim();
      const persona = document.getElementById("persona").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!message) {
        return;
      }

      sendButton.disabled = true;

      appendMessage("user", message);
      const assistantBody = appendMessage("assistant", "");

      try {
        const response = await fetch("/api/chat/stream", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            user_id: "user_id_001",
            chat_id: chatId || null,
            message,
            persona: persona || null
          })
        });

        if (!response.ok) {
          const errorText = await response.text();
          throw new Error(`HTTP ${response.status}: ${errorText}`);
        }

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");

        while (true) {
          const result = await reader.read();

          if (result.done) {
            break;
          }

          const chunk = decoder.decode(result.value, { stream: true });
          assistantBody.textContent += chunk;
          window.scrollTo(0, document.body.scrollHeight);
        }
      } catch (error) {
        assistantBody.classList.add("error");
        assistantBody.textContent = `请求失败：${error.message}`;
      } finally {
        sendButton.disabled = false;
      }
    }

    sendButton.addEventListener("click", sendMessage);

    document.getElementById("message").addEventListener("keydown", (event) => {
      if (event.key === "Enter" && event.ctrlKey) {
        sendMessage();
      }
    });
  </script>
</body>
</html>
